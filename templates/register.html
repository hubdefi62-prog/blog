<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Реєстрація</title>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">Реєстрація</h2>
            
            {% if error %}
                <div class="alert alert-danger text-center small p-2" role="alert">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Ваше ім'я</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Логін</label>
                    <input type="text" name="login" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Підтвердіть пароль</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 mb-3">Створити акаунт</button>
                <p class="text-center small">Вже є акаунт? <a href="/login">Увійти</a></p>
            </form>
        </div>
    </div>
</body>
</html>
